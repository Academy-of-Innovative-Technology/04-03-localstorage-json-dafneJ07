<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutant Database - X-Men Archives</title>
  
  <!-- Google Fonts for comic book style -->
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link href="src/css/style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <!-- Comic Book Header -->
  <header class="comic-header">
    <div class="container">
      <div class="header-content">
        <div class="logo-badge">X</div>
        <h1 class="main-title">MUTANT DATABASE</h1>
        <p class="subtitle">CLASSIFIED X-MEN ARCHIVES</p>
        <div class="storage-indicator">
          <span class="badge bg-warning text-dark">LOCALSTORAGE ACTIVE</span>
          <span class="badge bg-info text-dark ms-2" id="db-status">LOADING...</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mt-4 mb-5">
    <!-- Stats Bar -->
    <div class="stats-bar mb-4">
      <div class="row g-3">
        <div class="col-md-4">
          <div class="stat-card">
            <span class="stat-number" id="total-mutants">0</span>
            <span class="stat-label">Active Mutants</span>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <span class="stat-number" id="total-powers">0</span>
            <span class="stat-label">Unique Powers</span>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <span class="stat-number" id="total-teams">0</span>
            <span class="stat-label">Affiliations</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Mutant Cards Grid - JavaScript inserts cards here -->
    <div id="mutant-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      <!-- Cards will be dynamically inserted here by JavaScript -->
    </div>
  </main>

  <!-- Comic Footer -->
  <footer class="comic-footer">
    <div class="container text-center">
      <p class="footer-text">XAVIER'S SCHOOL FOR GIFTED YOUNGSTERS</p>
      <p class="footer-sub">1407 Graymalkin Lane, Salem Center, New York</p>
    </div>
  </footer>

  <!-- Bootstrap Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
  
  <!-- Custom Scripts - Order matters! Utilities first, then main script -->
  <script src="src/js/utilities.js"></script>
  <script src="src/js/script.js"></script>
</body>
</html>
